# Evolution Chat — stack de produção (Hetzner)
#
# Reconstruída a partir do dashboard após perda do servidor original.
# IMPORTANTE: os nomes dos serviços `evolution-api` e `chatwoot-rails` são
# CONTRATUAIS — o dashboard injeta `http://evolution-api:8080` e
# `http://chatwoot-rails:3000` como URLs container-a-container. NÃO renomear.
#
# Subir:    docker compose --env-file .env up -d
# Logs:     docker compose logs -f evolution-api chatwoot-rails

services:
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      # Cria os dois bancos no primeiro boot via script de init
      POSTGRES_DB: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - evolution-net

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - evolution-net

  evolution-api:
    image: atendai/evolution-api:v2.2.3
    container_name: evolution-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      SERVER_URL: http://${SERVER_IP}:8080
      AUTHENTICATION_API_KEY: ${EVOLUTION_API_KEY}
      AUTHENTICATION_TYPE: apikey
      LANGUAGE: pt-BR

      # Banco
      DATABASE_ENABLED: "true"
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/evolution?schema=public
      DATABASE_CONNECTION_CLIENT_NAME: evolution
      DATABASE_SAVE_DATA_INSTANCE: "true"
      DATABASE_SAVE_DATA_NEW_MESSAGE: "true"
      DATABASE_SAVE_MESSAGE_UPDATE: "true"
      DATABASE_SAVE_DATA_CONTACTS: "true"
      DATABASE_SAVE_DATA_CHATS: "true"
      DATABASE_SAVE_DATA_LABELS: "true"
      DATABASE_SAVE_DATA_HISTORIC: "true"

      # Cache Redis
      CACHE_REDIS_ENABLED: "true"
      CACHE_REDIS_URI: redis://redis:6379/6
      CACHE_REDIS_PREFIX_KEY: evolution
      CACHE_REDIS_SAVE_INSTANCES: "true"
      CACHE_LOCAL_ENABLED: "false"

      # Integração Chatwoot (per-instância é configurada pelo dashboard;
      # esta connection URI habilita o import opcional)
      CHATWOOT_ENABLED: "true"
      CHATWOOT_MESSAGE_READ: "true"
      CHATWOOT_MESSAGE_DELETE: "true"
      CHATWOOT_IMPORT_DATABASE_CONNECTION_URI: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/chatwoot?sslmode=disable
      CHATWOOT_IMPORT_PLACEHOLDER_MEDIA_MESSAGE: "false"

      # Webhook / QR
      QRCODE_LIMIT: "30"
      CONFIG_SESSION_PHONE_CLIENT: Evolution
      CONFIG_SESSION_PHONE_NAME: Chrome
      DEL_INSTANCE: "false"
    volumes:
      - evolution_instances:/evolution/instances
    networks:
      - evolution-net

  chatwoot-rails:
    image: chatwoot/chatwoot:v4.2.0-ce
    container_name: chatwoot-rails
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "3000:3000"
    env_file:
      - chatwoot.env
    entrypoint: docker/entrypoints/rails.sh
    command: ["bundle", "exec", "rails", "s", "-p", "3000", "-b", "0.0.0.0"]
    volumes:
      - chatwoot_storage:/app/storage
    networks:
      - evolution-net

  chatwoot-sidekiq:
    image: chatwoot/chatwoot:v4.2.0-ce
    container_name: chatwoot-sidekiq
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - chatwoot.env
    command: ["bundle", "exec", "sidekiq", "-C", "config/sidekiq.yml"]
    volumes:
      - chatwoot_storage:/app/storage
    networks:
      - evolution-net

networks:
  evolution-net:
    name: evolution-net

volumes:
  postgres_data:
  redis_data:
  evolution_instances:
  chatwoot_storage:
